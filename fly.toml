# fly.toml app configuration file generated for christjesus on 2026-03-25T17:48:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'christjesus'
primary_region = 'iad'

[build]

[env]
  ENVIRONMENT = "development"
  APP_BASE_URL = "https://christjesus.fly.dev"
  S3_BUCKET_NAME = "christjesus-documents-development"
  AUTH0_CALLBACK_URL = "https://christjesus.fly.dev/auth/callback"
  AUTH0_LOGOUT_URL = "https://christjesus.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
