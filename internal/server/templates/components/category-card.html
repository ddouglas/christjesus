{{define "component.category-card"}}
<a href="{{if .Slug}}/category/{{.Slug}}{{else}}/categories{{end}}"
  style="background:#fff;border:1.5px solid #DBEAFE;border-radius:10px;padding:20px 18px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:box-shadow 0.2s,border-color 0.2s;text-decoration:none;"
  onmouseover="this.style.borderColor='#1D4ED8';this.style.boxShadow='0 4px 18px rgba(29,78,216,0.1)'"
  onmouseout="this.style.borderColor='#DBEAFE';this.style.boxShadow='none'">
  <div style="width:40px;height:40px;border-radius:8px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;">
    <svg style="width:20px;height:20px;stroke:#1D4ED8;fill:none;stroke-width:1.8;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      {{if eq (derefOr .Icon "") "home"}}
      <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
      {{else if eq (derefOr .Icon "") "heart-pulse"}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
      {{else if eq (derefOr .Icon "") "utensils"}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 8.25v-1.5m-6 1.5v-1.5m12 9.75-1.5.75a3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0 3.354 3.354 0 0 0-3 0 3.354 3.354 0 0 1-3 0L3 16.5m15-3.379a48.474 48.474 0 0 0-6-.371c-2.032 0-4.034.126-6 .371m12 0c.39.049.777.102 1.163.16 1.07.16 1.837 1.094 1.837 2.175v5.169c0 .621-.504 1.125-1.125 1.125H4.125A1.125 1.125 0 0 1 3 20.625v-5.17c0-1.08.768-2.014 1.837-2.174A47.78 47.78 0 0 1 6 13.12M12.265 3.11a.375.375 0 1 1-.53 0L12 2.845l.265.265Zm-3 0a.375.375 0 1 1-.53 0L9 2.845l.265.265Zm6 0a.375.375 0 1 1-.53 0L15 2.845l.265.265Z" />
      {{else if or (eq (derefOr .Icon "") "truck") (eq (derefOr .Icon "") "car") (eq (derefOr .Icon "") "transportation")}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Zm10.5 0a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0ZM3 13.5V7.875c0-.621.504-1.125 1.125-1.125h10.056c.51 0 .97.308 1.166.78l1.489 3.72h2.04c.621 0 1.125.504 1.125 1.125V13.5M3 13.5h18M4.5 13.5v3.75c0 .621.504 1.125 1.125 1.125h.375m8.25 0h.75c.621 0 1.125-.504 1.125-1.125V13.5" />
      {{else if eq (derefOr .Icon "") "lightbulb"}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a6.01 6.01 0 0 0 1.5-.189m-1.5.189a6.01 6.01 0 0 1-1.5-.189m3.75 7.478a12.06 12.06 0 0 1-4.5 0m3.75 2.383a14.406 14.406 0 0 1-3 0M14.25 18v-.192c0-.983.658-1.823 1.508-2.316a7.5 7.5 0 1 0-7.517 0c.85.493 1.509 1.333 1.509 2.316V18" />
      {{else if eq (derefOr .Icon "") "users"}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" />
      {{else if or (eq (derefOr .Icon "") "academic-cap") (eq (derefOr .Icon "") "book-open") (eq (derefOr .Icon "") "education") (eq (derefOr .Icon "") "education-training")}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.448 60.448 0 0 1 15.48 0M21 16.5a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 16.5V8.824c0-.917.648-1.705 1.55-1.88a56.04 56.04 0 0 1 14.9 0c.902.175 1.55.963 1.55 1.88V16.5ZM12 14.25h.008v.008H12v-.008Z" />
      {{else if eq (derefOr .Icon "") "wallet"}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 0 0-2.25-2.25H15a3 3 0 1 1-6 0H5.25A2.25 2.25 0 0 0 3 12m18 0v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 9m18 0V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v3" />
      {{else}}
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6l4 2m6-2a10 10 0 1 1-20 0 10 10 0 0 1 20 0Z" />
      {{end}}
    </svg>
  </div>
  <p style="font-size:14px;font-weight:600;color:#0F172A;">{{.Name}}</p>
  <p style="font-size:12px;color:#475569;">{{.Count}} active needs</p>
</a>
{{end}}
