{{define "component.step-card"}}
<div style="background:#fff;border:1.5px solid #E2E8F0;border-radius:12px;padding:28px 24px;">
  <div style="width:36px;height:36px;background:#1D4ED8;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;margin-bottom:16px;" class="font-display">{{.Number}}</div>
  <p class="font-display" style="font-size:18px;font-weight:600;color:#0F172A;margin-bottom:8px;">{{.Title}}</p>
  <p style="font-size:13px;color:#475569;line-height:1.65;">{{.Description}}</p>
</div>
{{end}}
