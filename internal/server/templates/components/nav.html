{{define "component.nav"}}
<header class="sticky top-0 z-50 bg-[#0F2952]">
  <div class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 md:px-6" style="height:64px;">
    <a href="{{route "home"}}" class="font-display text-xl font-bold text-white" style="letter-spacing:-0.01em;">Body of Christ</a>
    <nav class="hidden items-center gap-7 text-sm md:flex">
      <a href="{{route "browse"}}" class="text-white/70 transition-colors hover:text-white">Browse Needs</a>
      <a href="{{route "categories"}}" class="text-white/70 transition-colors hover:text-white">Categories</a>
      <a href="{{route "map"}}" class="text-white/70 transition-colors hover:text-white">Map</a>
      <a href="{{route "guidelines"}}" class="text-white/70 transition-colors hover:text-white">Guidelines</a>
      {{if .Navbar.IsAdmin}}<a href="{{route "admin.dashboard"}}" class="text-white/70 transition-colors hover:text-white">Admin</a>{{end}}
    </nav>
    <div class="flex items-center gap-2">
      {{if .Navbar.IsAuthenticated}}
      <div class="hidden items-center gap-2 md:flex">
        <span class="text-sm text-white/70">Welcome, {{.Navbar.UserName}}</span>
        <details data-profile-menu class="group relative">
          <summary class="flex h-9 w-9 cursor-pointer list-none items-center justify-center overflow-hidden rounded-full border border-white/20 bg-white/10">
            <img src="{{.Navbar.AvatarURL}}" alt="Profile" class="h-full w-full object-cover" />
          </summary>
          <div class="absolute right-0 z-20 mt-2 w-44 rounded-md border border-[#E2E8F0] bg-white p-1 shadow-lg">
            <a href="{{route "profile"}}" class="block rounded px-3 py-2 text-sm text-[#0F172A] transition-colors hover:bg-[#EFF6FF]">Profile</a>
            <div class="my-1 border-t border-[#E2E8F0]"></div>
            <form method="POST" action="{{route "logout"}}">
              {{.CSRFField}}
              <button type="submit" class="block w-full rounded px-3 py-2 text-left text-sm text-[#0F172A] transition-colors hover:bg-[#EFF6FF]">Log Out</button>
            </form>
          </div>
        </details>
      </div>
      {{else}}
        <a href="{{route "login"}}" class="hidden rounded-md px-3 py-1.5 text-sm font-medium text-white/80 transition-colors hover:bg-white/10 hover:text-white md:inline-flex">Sign In</a>
        <a href="{{route "onboarding"}}" class="hidden rounded-md bg-white px-4 py-1.5 text-sm font-semibold text-[#1D4ED8] transition-opacity hover:opacity-90 md:inline-flex">Give Now</a>
      {{end}}
    </div>
  </div>
</header>
<script>
  (() => {
    const menus = document.querySelectorAll('details[data-profile-menu]')
    if (!menus.length) return

    document.addEventListener('click', (event) => {
      menus.forEach((menu) => {
        if (!menu.contains(event.target)) {
          menu.removeAttribute('open')
        }
      })
    })

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return
      menus.forEach((menu) => menu.removeAttribute('open'))
    })
  })()
</script>
{{end}}
