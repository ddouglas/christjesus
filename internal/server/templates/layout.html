{{define "header"}}
<!doctype html>
<html lang="en">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{with .Title}}{{.}}
      {{else}}Welcome{{end}} | Christ Jesus
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/tokens.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'var(--background)',
              foreground: 'var(--foreground)',
              card: 'var(--card)',
              'card-foreground': 'var(--card-foreground)',
              primary: 'var(--primary)',
              'primary-foreground': 'var(--primary-foreground)',
              secondary: 'var(--secondary)',
              'secondary-foreground': 'var(--secondary-foreground)',
              muted: 'var(--muted)',
              'muted-foreground': 'var(--muted-foreground)',
              accent: 'var(--accent)',
              'accent-foreground': 'var(--accent-foreground)',
              border: 'var(--border)',
              destructive: 'var(--destructive)',
              gold: 'var(--gold)',
              'gold-light': 'var(--gold-light)',
              'gold-pale': 'var(--gold-pale)',
              midnight: 'var(--midnight)',
              'midnight-mid': 'var(--midnight-mid)',
              ink: 'var(--ink)',
              'ink-soft': 'var(--ink-soft)',
              cream: 'var(--cream)',
            },
            fontFamily: {
              sans: ['Jost', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              display: ['Cormorant Garamond', 'Georgia', 'serif'],
            },
          },
        },
        safelist: [
          {
            pattern: /bg-\[color:var\(--cj-.+\)\]/,
          },
          {
            pattern: /text-\[color:var\(--cj-.+\)\]/,
          },
          {
            pattern: /border-\[color:var\(--cj-.+\)\]/,
          },
        ],
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.8"></script>
    <style>
      .htmx-indicator {
        display: none;
      }

      .htmx-request.htmx-indicator {
        display: block;
      }

      #browse-loading.htmx-request~#browse-results-content {
        display: none;
      }
    </style>
  </head>

  <body class="bg-[#FAF7F0] text-foreground min-h-screen">
    <div class="flex min-h-screen flex-col bg-[#FAF7F0] text-foreground">
      {{template "component.nav" .}}
      <main class="flex-1">
        {{end}}

        {{define "footer"}}
      </main>
      {{template "component.footer" .}}
    </div>
  </body>

</html>
{{end}}
