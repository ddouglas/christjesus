{{define "page.complete_profile"}}
{{template "header" .}}

<div class="mx-auto w-full max-w-md px-4 py-16 md:px-6">
  <div class="space-y-2 text-center">
    <h1 class="text-3xl font-semibold text-foreground">Complete Your Profile</h1>
    <p class="text-muted-foreground">Tell us your name before continuing.</p>
  </div>

  {{if .Error}}
  <div class="mt-6 rounded-md border border-[color:var(--cj-error)] border-l-4 bg-muted px-4 py-3 text-sm font-semibold text-[color:var(--cj-error)]" role="alert" aria-live="polite">
    {{.Error}}
  </div>
  {{end}}

  <form method="POST" class="mt-8 space-y-6">
    {{.CSRFField}}

    <div class="space-y-2">
      <label for="given_name" class="text-sm font-medium text-foreground">
        First Name <span class="text-[color:var(--cj-error)]">*</span>
      </label>
      <input type="text" id="given_name" name="given_name" required autofocus value="{{.GivenName}}" maxlength="100"
        class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
        placeholder="Enter your first name" />
    </div>

    <div class="space-y-2">
      <label for="family_name" class="text-sm font-medium text-foreground">Last Name</label>
      <input type="text" id="family_name" name="family_name" value="{{.FamilyName}}" maxlength="100"
        class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2"
        placeholder="Enter your last name" />
    </div>

    <button type="submit"
      class="inline-flex h-10 w-full items-center justify-center rounded-md bg-[color:var(--cj-primary)] px-4 text-sm font-medium text-white transition-colors hover:bg-[color:var(--cj-primary)]/90">
      Continue
    </button>
  </form>
</div>

{{template "footer" .}}
{{end}}
