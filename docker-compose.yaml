services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: christjesus-app
    ports:
      - "8080:8080"
    environment:
      - COOKIE_HASH_KEY
      - COOKIE_BLOCK_KEY
      - DATABASE_URL
      - S3_BUCKET_NAME
      - STRIPE_PUBLISHABLE_KEY
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET
      - AUTH0_CLIENT_ID
      - AUTH0_CLIENT_SECRET
      - AUTH0_DOMAIN
      - AUTH0_CALLBACK_URL
      - AUTH0_LOGOUT_URL
      - AUTH0_MGMT_CLIENT_ID
      - AUTH0_MGMT_CLIENT_SECRET
      - TIGRIS_ACCESS_KEY
      - TIGRIS_SECRET_KEY
      - USPS_CONSUMER_KEY
      - USPS_CONSUMER_SECRET
      - RESEND_API_KEY
      - RESEND_WEBHOOK_SECRET
      - EMAIL_FROM_ADDRESS

  db:
    image: postgres:18-alpine
    container_name: christjesus-db
    environment:
      POSTGRES_USER: christjesus
      POSTGRES_PASSWORD: christjesus
      POSTGRES_DB: christjesus
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U christjesus"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
